name: tag-and-release-packages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pesde
        uses: lumin-org/setup-pesde@v0.4.1

      - name: Install deps (rojo)
        run: pesde i

      - name: Find changed pesde.toml files
        id: changed
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          files=$(git diff --name-only "$BEFORE" "$AFTER" | grep '^packages/.*/pesde.toml' || true)

          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Tag, build, and release
        if: steps.changed.outputs.files != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BEFORE="${{ github.event.before }}"

          echo "${{ steps.changed.outputs.files }}" | while read file; do
            [ -z "$file" ] && continue

            echo "Processing $file"

            old_version=$(git show "$BEFORE:$file" | grep '^version' | head -n1 | sed 's/.*"\(.*\)".*/\1/' || true)
            new_version=$(grep '^version' "$file" | head -n1 | sed 's/.*"\(.*\)".*/\1/' || true)

            if [ "$old_version" = "$new_version" ]; then
              echo "Version unchanged, skipping"
              continue
            fi

            package=$(echo "$file" | cut -d'/' -f2)
            tag="${package}@${new_version}"
            output="${package}.rbxm"
            changelog="packages/$package/CHANGELOG.md"

            echo "Creating tag $tag"

            if ! git rev-parse "$tag" >/dev/null 2>&1; then
              git tag "$tag"
              git push origin "$tag"
            fi

            echo "Building $package"
            rojo build "packages/$package" -o "$output"

            echo "Extracting changelog for $new_version"

            if [ -f "$changelog" ]; then
              notes=$(awk "/^## $new_version$/,/^## /" "$changelog" | sed '1d;$d')
            else
              notes="Release for $package@$new_version"
            fi

            if [ -z "$notes" ]; then
              notes="Release for $package@$new_version"
            fi

            echo "Creating GitHub release"

            gh release create "$tag" "$output" \
              --title "$tag" \
              --notes "$notes" \
              || gh release upload "$tag" "$output" --clobber
          done
