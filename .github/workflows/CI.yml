name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Run StyLua & Selene

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pesde
        uses: lumin-org/setup-pesde@v0.4.1

      - name: Install dependencies
        run: pesde install

      - name: Run StyLua (format check)
        run: stylua --check packages/*/source/**

      - name: Run Selene (lint)
        run: selene packages/*/source/**
